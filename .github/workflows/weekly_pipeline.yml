name: Weekly Data Pipeline

on:
  schedule:
    - cron: "0 8 * * 1" # Every Monday at 08:00 UTC
  workflow_dispatch: {}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Run weekly pipeline
        run: |
          python scripts/weekly_pipeline.py

      - name: Commit generated artifacts
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add -A resources/initial_data resources/fighter_vectors resources/clean_data model/fight/outcome_artifacts* || true
          if ! git diff --staged --quiet; then
            git commit -m "Automated weekly data refresh [skip ci]" || echo "commit failed"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
          git add -A resources/fighter_vectors/outcome_vectors.csv || true
          git add -A model/fight/outcome_training_vectors.csv || true
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
